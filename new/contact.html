<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <meta content="Contact and directions for Honley Cricket Club." name="description"/>
    <meta content="Richard Kingston" name="author"/>
    <title>Honley Cricket Club - Contact</title>
    <link href="favicon.png" rel="shortcut icon" type="image/x-icon"/>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="css/base.css" rel="stylesheet"/>
    <link href="css/layout.css" rel="stylesheet"/>
    <link href="css/components.css" rel="stylesheet"/>
</head>
<body class="contact-page">
<div id="site-header"></div>
<main class="content-shell content-shell-compact">
    <div class="container">
        <div class="page-header-intro">
            <h1>Contact &amp; directions</h1>
            <p class="page-subtitle">How to contact, visit and find Honley Cricket Club.</p>
        </div>
        <div class="row page-header-content">
            <div class="col-md-4 membership-sidebar-sticky">
                <div class="info-card compact-info-card join-card-prominent">
                    <i aria-hidden="true" class="bi bi-envelope-fill"></i>
                    <h3>Need help?</h3>
                    <div class="contact-email-group">
                        <div class="contact-email-item">
                            <label>General information:</label>
                            <a class="email-button"
                               href="mailto:honleycc@gmail.com?subject=General%20Membership%20Enquiry">
                                <i class="bi bi-envelope-fill"></i>
                                honleycc@gmail.com
                            </a>
                        </div>
                        <div class="contact-email-item">
                            <label>Junior cricket:</label>
                            <a class="email-button" href="mailto:honleyjuniorcc@gmail.com?subject=Junior%20Cricket%20Enquiry">
                                <i class="bi bi-envelope-fill"></i>
                                honleyjuniorcc@gmail.com
                            </a>
                        </div>
                        <div class="contact-email-item">
                            <label>Women’s and girls’ cricket:</label>
                            <a class="email-button"
                               href="mailto:honley.women.girls.cc@gmail.com?subject=Women%27s%20and%20Girls%20Cricket%20Enquiry">
                                <i class="bi bi-envelope-fill"></i>
                                honley.women.girls.cc@gmail.com
                            </a>
                        </div>

                        <div class="contact-email-item">
                            <label>Safeguarding:</label>
                            <a class="email-button"
                               href="mailto:honleyccsafeguarding@gmail.com?subject=E-mail%20from%20HCC%20web%20site">
                                <i class="bi bi-envelope-fill"></i>
                                honleyccsafeguarding@gmail.com
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <section aria-labelledby="contact-heading" class="content-card feature-card header-feed-card">
                    <div class="section-tag">
                        <i aria-hidden="true" class="bi bi-geo-alt-fill"></i>
                        <span>Honley Cricket Club, Far End Lane, Honley, Holmfirth, HD9 6NS</span>
                    </div>
                    <div class="contact-map-actions">
                        <a class="btn btn-primary"
                           href="https://www.google.com/maps/search/?api=1&amp;query=53.601164,-1.789623" rel="noopener"
                           target="_blank">
                            <i aria-hidden="true" class="bi bi-geo-alt-fill"></i>
                            Open in Google Maps
                        </a>
                        <a class="btn btn-primary"
                           href="https://www.google.com/maps/dir/?api=1&amp;destination=53.601164,-1.789623"
                           rel="noopener" target="_blank">
                            <i aria-hidden="true" class="bi bi-compass-fill"></i>
                            Get directions
                        </a>
                    </div>
                    <div class="contact-map-wrap">
                        <iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                                src="https://www.google.com/maps?q=53.601164,-1.789623&amp;z=15&amp;output=embed"
                                title="Map showing Honley Cricket Club location">
                        </iframe>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>
<div id="site-footer"></div>
<script defer src="js/site-shell.js"></script>
<script defer src="js/play-cricket.js"></script>
<script defer src="js/pages.js"></script>
</body>
</html>
