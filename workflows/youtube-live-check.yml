name: Update live stream JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-live-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Detect current live stream
        shell: bash
        run: |
          mkdir -p data

          LIVE_URL=$(yt-dlp --skip-download --print "%(webpage_url)s" "https://www.youtube.com/@honleycc6945/live" 2>/dev/null | head -n 1 || true)
          TITLE=$(yt-dlp --skip-download --print "%(title)s" "https://www.youtube.com/@honleycc6945/live" 2>/dev/null | head -n 1 || true)
          STATUS=$(yt-dlp --skip-download --print "%(live_status)s" "https://www.youtube.com/@honleycc6945/live" 2>/dev/null | head -n 1 || true)

          VIDEO_ID=""
          LIVE_FLAG="false"

          if [[ "$STATUS" == "is_live" && "$LIVE_URL" == *"watch?v="* ]]; then
            VIDEO_ID="${LIVE_URL##*watch?v=}"
            VIDEO_ID="${VIDEO_ID%%&*}"
            LIVE_FLAG="true"
          fi

          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > data/live-stream.json <<EOF
          {
            "live": $LIVE_FLAG,
            "videoId": "$VIDEO_ID",
            "title": "$(printf '%s' "$TITLE" | sed 's/"/\\"/g')",
            "updated": "$UPDATED"
          }
          EOF

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-stream.json
          git diff --cached --quiet || git commit -m "Update live stream JSON"
          git push