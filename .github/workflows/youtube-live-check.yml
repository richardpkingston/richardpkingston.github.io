name: Update live stream JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-live-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python -m pip install --upgrade yt-dlp

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Detect current live stream
        shell: bash
        run: |
          LIVE_JSON=$(yt-dlp -J "https://www.youtube.com/@honleycc6945/live" 2>/dev/null || true)

          VIDEO_ID=$(echo "$LIVE_JSON" | jq -r '.id // empty')
          IS_LIVE=$(echo "$LIVE_JSON" | jq -r '.is_live // false')
          TITLE=$(echo "$LIVE_JSON" | jq -r '.title // empty')

          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ "$IS_LIVE" == "true" && -n "$VIDEO_ID" ]]; then
            cat > data/live-stream.json <<EOF
          {
            "live": true,
            "videoId": "$VIDEO_ID",
            "title": $(jq -Rn --arg v "$TITLE" '$v'),
            "updated": "$UPDATED"
          }
          EOF
          else
            cat > data/live-stream.json <<EOF
          {
            "live": false,
            "videoId": "",
            "title": "",
            "updated": "$UPDATED"
          }
          EOF
          fi

          echo "Generated data/live-stream.json:"
          cat data/live-stream.json

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-stream.json
          git diff --cached --quiet || git commit -m "Update live stream JSON"
          git push
